<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>MA Store</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* ربط الخلفية */
            background-image: url('bg.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            overflow: hidden;
        }

        .shoe-img {
            width: 300px; /* حجم الكوتشي */
            animation: spin 8s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <img src="shoe.png" alt="My Shoe" class="shoe-img">

</body>
</html>
