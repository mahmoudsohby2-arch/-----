<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MA Store | Premium</title>
    <style>
        body { 
            margin: 0; 
            padding: 0;
            /* وضع صورة الصخر كخلفية */
            background-image: url('1000004508.png'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden; 
        }
        
        .shoe-img { 
            width: 80%; 
            max-width: 500px; 
            height: auto;
            /* حركة "الطيران" للكوتشي فقط */
            animation: float 3s ease-in-out infinite; 
            /* إضافة ظل خفيف تحت الكوتشي ليعطي عمق */
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.5));
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-30px); }
        }
    </style>
</head>
<body>
    <img class="shoe-img" src="1000004493.png" alt="MA Shoe">
</body>
</html>
