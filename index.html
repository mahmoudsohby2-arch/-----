<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MA Store | Premium Sneakers</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #0a192f; 
        }
        
        /* الخلفية: الصخور ثابتة وتملا الشاشة */
        .background {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('rock_bg.png'); /* اسم الملف الموحد */
            background-size: cover;
            background-position: center;
            z-index: 1;
        }

        /* الكوتشي: بيلف 360 درجة في النص */
        .shoe {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            max-width: 500px;
            z-index: 2;
            animation: rotateShoe 15s linear infinite; /* جعلنا الدوران أبطأ وأشيك */
            filter: drop-shadow(0 30px 40px rgba(0,0,0,0.7)); /* ظل لإعطاء عمق فوق الصخر */
        }

        @keyframes rotateShoe {
            0% { transform: translate(-50%, -50%) rotate(15deg); }
            50% { transform: translate(-50%, -50%) rotate(375deg); } /* 15 + 360 = 375 لفة كاملة */
            100% { transform: translate(-50%, -50%) rotate(15deg); }
        }
    </style>
</head>
<body>
    <div class="background"></div>
    <img class="shoe" src="shoe.png" alt="MA Sneaker"> </body>
</html>
