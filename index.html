<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MA Store | Premium Sneakers</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        
        /* شاشة البداية ملء الشاشة */
        #intro-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: #0a192f;
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
            transition: opacity 1s ease;
        }

        /* تحريك الكوتشي فقط */
        .intro-shoe-img {
            width: 80%; /* حجم كبير للصورة */
            max-width: 600px;
            height: auto;
            animation: floatAndRotate 3s ease-in-out infinite;
        }

        @keyframes floatAndRotate {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        /* تنسيق باقي الموقع يظل كما هو.. */
    </style>
</head>
<body>

    <div id="intro-screen">
        <img class="intro-shoe-img" src="1782484455215.png" alt="Shoe">
    </div>

    <!-- باقي كود الموقع الخاص بك هنا -->

    <script>
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('intro-screen').style.opacity = '0';
                setTimeout(() => { document.getElementById('intro-screen').style.display = 'none'; }, 1000);
            }, 3000);
        });
    </script>
</body>
</html>
