<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MA Store | Premium</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
        
        /* الخلفية: الصخور ثابتة وتملا الشاشة */
        .background {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('1000004596.png');
            background-size: cover;
            background-position: center;
            z-index: 1;
        }

        /* الكوتشي: بيلف 360 درجة في النص */
        .shoe {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            max-width: 500px;
            z-index: 2;
            animation: rotateShoe 10s linear infinite;
        }

        @keyframes rotateShoe {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="background"></div>
    <img class="shoe" src="1000004500.png" alt="MA Sneaker">
</body>
</html>
